<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmark-Manager</title>
    <script type="module" crossorigin src="/Bookmark-Manager/index.js"></script>
    <link rel="stylesheet" crossorigin href="/Bookmark-Manager/assets/index-DQvI_ImX.css">
  </head>
  <body>
    <header class="header container">
      <form class="form">
        <label>
          <input
            type="text"
            name="title-text"
            placeholder="Please enter title"
            required
          />
        </label>
        <label>
          <input
            type="url"
            name="url-text"
            placeholder="Add URL link"
            required
          />
        </label>
        <button class="btn-submit" type="submit">Add</button>
      </form>
      <ul class="bookmark-list"></ul>
      <button type="button" class="delete-btn">Delete</button>
      <button type="button" class="edit-btn">Edit</button>
    </header>
  </body>
</html>
